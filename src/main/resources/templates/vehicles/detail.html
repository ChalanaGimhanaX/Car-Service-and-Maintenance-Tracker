<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Vehicle Details', ~{::section})}">
<section>
    <div class="mb-6 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
        <div>
            <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Vehicle details</p>
            <h1 class="text-3xl font-semibold text-white" th:text="${vehicle.vehicleNumber}">ABC-1234</h1>
            <p class="text-sm text-slate-400" th:text="${vehicle.brand + ' ' + vehicle.model + ' - ' + vehicle.type}">Toyota Prius - Sedan</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/vehicles}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Back
            </a>
            <a class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}">
                <i data-lucide="square-pen" class="h-4 w-4"></i>Edit
            </a>
        </div>
    </div>

    <div class="grid gap-6 lg:grid-cols-[1fr_0.75fr]">
        <div class="rounded-md border soft-border glass-panel p-5">
            <h2 class="text-lg font-semibold text-white">Record summary</h2>
            <dl class="mt-5 grid gap-4 sm:grid-cols-2">
                <div>
                    <dt class="text-xs uppercase tracking-[0.18em] text-slate-500">Brand</dt>
                    <dd class="mt-1 text-slate-100" th:text="${vehicle.brand}">Toyota</dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-[0.18em] text-slate-500">Model</dt>
                    <dd class="mt-1 text-slate-100" th:text="${vehicle.model}">Prius</dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-[0.18em] text-slate-500">Type</dt>
                    <dd class="mt-1 text-slate-100" th:text="${vehicle.type}">Sedan</dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-[0.18em] text-slate-500">Fuel type</dt>
                    <dd class="mt-1 text-slate-100" th:text="${vehicle.fuelType}">HYBRID</dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-[0.18em] text-slate-500">Year</dt>
                    <dd class="mt-1 text-slate-100" th:text="${vehicle.year}">2020</dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-[0.18em] text-slate-500">Mileage</dt>
                    <dd class="mt-1 text-slate-100" th:text="${#numbers.formatInteger(vehicle.mileage, 0, 'COMMA') + ' km'}">45,000 km</dd>
                </div>
            </dl>

            <div class="mt-6">
                <h3 class="text-sm font-semibold text-slate-200">Notes</h3>
                <p class="mt-2 whitespace-pre-line text-sm text-slate-400" th:text="${vehicle.notes != null ? vehicle.notes : 'No notes recorded.'}">No notes recorded.</p>
            </div>
        </div>

        <aside class="rounded-md border soft-border glass-panel p-5">
            <h2 class="text-lg font-semibold text-white">Operations</h2>
            <div class="mt-4 space-y-4 text-sm">
                <div>
                    <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Status</p>
                    <span class="badge mt-2"
                          th:classappend="${vehicle.status.name() == 'ACTIVE'} ? ' badge-active' : (${vehicle.status.name() == 'IN_SERVICE'} ? ' badge-pending' : (${vehicle.status.name() == 'OUT_OF_SERVICE'} ? ' badge-suspended' : ' badge-deleted'))"
                          th:text="${vehicle.status}">ACTIVE</span>
                </div>
                <div>
                    <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Created</p>
                    <p class="mt-1 text-slate-300" th:text="${#temporals.format(vehicle.createdAt, 'dd MMM yyyy, HH:mm')}">01 Jan 2026, 10:00</p>
                </div>
                <div>
                    <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Last updated</p>
                    <p class="mt-1 text-slate-300" th:text="${#temporals.format(vehicle.updatedAt, 'dd MMM yyyy, HH:mm')}">01 Jan 2026, 10:00</p>
                </div>
                <form th:action="@{/vehicles/{id}/delete(id=${vehicle.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="action-button w-full justify-center bg-rose-500/15 text-rose-200 hover:bg-rose-500/25" type="submit">
                        <i data-lucide="trash-2" class="h-4 w-4"></i>Archive vehicle
                    </button>
                </form>
            </div>
        </aside>
    </div>
</section>
</html>
