<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout(${moduleName}, ~{::section})}">
<section>
    <div class="rounded-md border border-dashed soft-border glass-panel p-8">
        <p class="text-sm uppercase tracking-[0.22em] text-amber-300">Reserved module</p>
        <h1 class="mt-3 text-3xl font-semibold text-white" th:text="${moduleName}">Module</h1>
        <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-400" th:text="${moduleOwner}">Reserved for another team member.</p>
        <div class="mt-6 rounded-md border soft-border bg-slate-950/60 p-4 text-sm text-slate-300">
            This section is intentionally left open for the assigned component owner.
        </div>
    </div>
</section>
</html>
