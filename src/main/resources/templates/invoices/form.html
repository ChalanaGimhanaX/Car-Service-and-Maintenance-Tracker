<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Invoice Form', ~{::section})}">
<section>
    <div class="mb-6">
        <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Billing</p>
        <h1 class="text-3xl font-semibold text-white"
            th:text="${formMode == 'edit' ? 'Edit invoice' : 'Create invoice'}">Create invoice</h1>
        <p class="text-sm text-slate-400">Save invoice details for a completed service record.</p>
    </div>

    <form class="rounded-md border soft-border glass-panel p-5" th:object="${invoiceForm}"
          th:action="${formMode == 'edit'} ? @{/invoices/{id}/edit(id=${invoiceId})} : @{/invoices}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="grid gap-4 md:grid-cols-2">
            <div class="md:col-span-2">
                <label class="mb-2 block text-sm font-medium text-slate-300" for="serviceRecordId">Service record</label>
                <select class="form-input" id="serviceRecordId" th:field="*{serviceRecordId}">
                    <option value="">Select a service record</option>
                    <option th:each="record : ${serviceRecords}"
                            th:value="${record.id}"
                            th:text="${record.vehicle.vehicleNumber + ' - ' + record.serviceType + ' (' + #temporals.format(record.serviceDate, 'dd MMM yyyy') + ')'}"></option>
                </select>
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('serviceRecordId')}" th:errors="*{serviceRecordId}"></p>
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="invoiceNumber">Invoice number</label>
                <input class="form-input" id="invoiceNumber" type="text" th:field="*{invoiceNumber}" placeholder="INV-1001">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('invoiceNumber')}" th:errors="*{invoiceNumber}"></p>
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="invoiceDate">Invoice date</label>
                <input class="form-input" id="invoiceDate" type="date" th:field="*{invoiceDate}">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('invoiceDate')}" th:errors="*{invoiceDate}"></p>
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="totalAmount">Total amount (LKR)</label>
                <input class="form-input" id="totalAmount" type="number" min="0" step="0.01" th:field="*{totalAmount}" placeholder="7500.00">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('totalAmount')}" th:errors="*{totalAmount}"></p>
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="paymentStatus">Payment status</label>
                <select class="form-input" id="paymentStatus" th:field="*{paymentStatus}">
                    <option th:each="status : ${paymentStatuses}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="mb-2 block text-sm font-medium text-slate-300" for="paymentMethod">Payment method</label>
                <select class="form-input" id="paymentMethod" th:field="*{paymentMethod}">
                    <option value="">Select a payment method</option>
                    <option th:each="method : ${paymentMethods}" th:value="${method}" th:text="${method}"></option>
                </select>
            </div>
        </div>

        <div class="mt-4">
            <label class="mb-2 block text-sm font-medium text-slate-300" for="notes">Notes</label>
            <textarea class="form-input min-h-32" id="notes" th:field="*{notes}" placeholder="Optional notes about the payment or invoice"></textarea>
            <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></p>
        </div>

        <div class="mt-5 flex flex-wrap gap-3">
            <button class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" type="submit">
                <i data-lucide="save" class="h-4 w-4"></i>
                <span th:text="${formMode == 'edit' ? 'Save changes' : 'Create invoice'}">Create invoice</span>
            </button>
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/invoices}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Back to list
            </a>
        </div>
    </form>
</section>
</html>
