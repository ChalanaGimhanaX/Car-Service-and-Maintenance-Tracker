<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/base :: layout('Invoice Detail', ~{::section})}">
<section>
    <div class="mb-6 flex flex-wrap items-start justify-between gap-4">
        <div>
            <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Billing</p>
            <h1 class="text-3xl font-semibold text-white">Invoice Detail</h1>
            <p class="text-sm text-slate-400">Invoice summary for the selected service record.</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <a sec:authorize="hasRole('ADMIN')" class="action-button bg-white/5 text-slate-200 hover:bg-white/10"
               th:href="@{/invoices/{id}/edit(id=${invoice.id})}">
                <i data-lucide="square-pen" class="h-4 w-4"></i>Edit
            </a>
            <form sec:authorize="hasRole('ADMIN')" th:action="@{/invoices/{id}/delete(id=${invoice.id})}" method="post"
                  onsubmit="return confirm('Delete this invoice?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="action-button bg-rose-500/20 text-rose-300 hover:bg-rose-500/30" type="submit">
                    <i data-lucide="trash-2" class="h-4 w-4"></i>Delete
                </button>
            </form>
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/invoices}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Back to list
            </a>
        </div>
    </div>

    <div class="rounded-md border soft-border glass-panel p-5 grid gap-6 md:grid-cols-2">
        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Invoice number</p>
            <p class="text-white font-medium" th:text="${invoice.invoiceNumber}">INV-1001</p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Invoice date</p>
            <p class="text-white" th:text="${#temporals.format(invoice.invoiceDate, 'dd MMM yyyy')}">16 May 2026</p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Vehicle</p>
            <a class="text-emerald-300 hover:underline font-medium"
               th:href="@{/vehicles/{id}(id=${invoice.serviceRecord.vehicle.id})}"
               th:text="${invoice.serviceRecord.vehicle.vehicleNumber}"></a>
            <p class="text-sm text-slate-400"
               th:text="${invoice.serviceRecord.vehicle.brand + ' ' + invoice.serviceRecord.vehicle.model}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Service type</p>
            <p class="text-white font-medium" th:text="${invoice.serviceRecord.serviceType}">Oil change</p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Service date</p>
            <p class="text-white" th:text="${#temporals.format(invoice.serviceRecord.serviceDate, 'dd MMM yyyy')}">12 May 2026</p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Payment method</p>
            <p class="text-white" th:text="${invoice.paymentMethod != null ? invoice.paymentMethod : '-'}">CASH</p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Total amount</p>
            <p class="text-white font-medium" th:text="${#numbers.formatDecimal(invoice.totalAmount, 1, 'COMMA', 2, 'POINT') + ' LKR'}">7,500.00 LKR</p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Payment status</p>
            <span class="badge"
                  th:classappend="${invoice.paymentStatus.name() == 'PAID'} ? ' badge-active' : (${invoice.paymentStatus.name() == 'PENDING'} ? ' badge-pending' : ' badge-deleted')"
                  th:text="${invoice.paymentStatus}">PENDING</span>
        </div>

        <div class="md:col-span-2">
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Notes</p>
            <p class="text-white" th:text="${invoice.notes != null ? invoice.notes : '-'}">Notes</p>
        </div>
    </div>
</section>
</html>
