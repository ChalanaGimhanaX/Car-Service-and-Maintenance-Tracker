<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/base :: layout('Invoices', ~{::section})}">
<section>
    <div class="mb-6 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
        <div>
            <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Billing</p>
            <h1 class="text-3xl font-semibold text-white">Invoices</h1>
            <p class="text-sm text-slate-400">View and manage service invoices and payment status.</p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" th:href="@{/invoices/new}">
            <i data-lucide="plus" class="h-4 w-4"></i>Create invoice
        </a>
    </div>

    <form class="rounded-md border soft-border glass-panel p-4" th:action="@{/invoices}" method="get">
        <div class="grid gap-3 lg:grid-cols-[1.4fr_0.8fr_auto]">
            <div>
                <label class="mb-2 block text-xs uppercase tracking-[0.18em] text-slate-500">Search</label>
                <input class="form-input" type="text" name="q" th:value="${keyword}" placeholder="Search by invoice, vehicle, or service type">
            </div>
            <div>
                <label class="mb-2 block text-xs uppercase tracking-[0.18em] text-slate-500">Payment status</label>
                <select class="form-input" name="status">
                    <option value="">All statuses</option>
                    <option th:each="status : ${statusValues}" th:value="${status}" th:text="${status}" th:selected="${selectedStatus == status.name()}"></option>
                </select>
            </div>
            <div class="flex items-end gap-2">
                <button class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" type="submit">
                    <i data-lucide="search" class="h-4 w-4"></i>Filter
                </button>
                <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/invoices}">
                    <i data-lucide="rotate-ccw" class="h-4 w-4"></i>Reset
                </a>
            </div>
        </div>
    </form>

    <div class="mt-6 overflow-hidden rounded-md border soft-border glass-panel">
        <table class="min-w-full divide-y divide-white/10 text-sm">
            <thead class="bg-slate-900/90 text-slate-400">
            <tr>
                <th class="px-4 py-3 text-left font-medium">Invoice</th>
                <th class="px-4 py-3 text-left font-medium">Vehicle</th>
                <th class="px-4 py-3 text-left font-medium">Date</th>
                <th class="px-4 py-3 text-left font-medium">Amount</th>
                <th class="px-4 py-3 text-left font-medium">Status</th>
                <th class="px-4 py-3 text-right font-medium">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-white/10 bg-slate-950/40">
            <tr class="table-row" th:each="invoice : ${invoicesPage.content}">
                <td class="px-4 py-3 text-slate-100">
                    <div class="font-medium" th:text="${invoice.invoiceNumber}">INV-1001</div>
                    <div class="text-xs text-slate-500" th:text="${invoice.serviceRecord.serviceType}">Oil change</div>
                </td>
                <td class="px-4 py-3 text-slate-300">
                    <div th:text="${invoice.serviceRecord.vehicle.vehicleNumber}">WP CAB-4582</div>
                    <div class="text-xs text-slate-500" th:text="${invoice.serviceRecord.vehicle.brand + ' ' + invoice.serviceRecord.vehicle.model}">Toyota Aqua</div>
                </td>
                <td class="px-4 py-3 text-slate-300" th:text="${#temporals.format(invoice.invoiceDate, 'dd MMM yyyy')}">16 May 2026</td>
                <td class="px-4 py-3 text-slate-300" th:text="${#numbers.formatDecimal(invoice.totalAmount, 1, 'COMMA', 2, 'POINT')}">7,500.00</td>
                <td class="px-4 py-3">
                    <span class="badge"
                          th:classappend="${invoice.paymentStatus.name() == 'PAID'} ? ' badge-active' : (${invoice.paymentStatus.name() == 'PENDING'} ? ' badge-pending' : ' badge-deleted')"
                          th:text="${invoice.paymentStatus}">PENDING</span>
                </td>
                <td class="px-4 py-3">
                    <div class="flex flex-wrap justify-end gap-2">
                        <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/invoices/{id}(id=${invoice.id})}">
                            <i data-lucide="eye" class="h-4 w-4"></i>View
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/invoices/{id}/edit(id=${invoice.id})}">
                            <i data-lucide="square-pen" class="h-4 w-4"></i>Edit
                        </a>
                        <form sec:authorize="hasRole('ADMIN')" th:action="@{/invoices/{id}/delete(id=${invoice.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="action-button bg-rose-500/15 text-rose-200 hover:bg-rose-500/25" type="submit">
                                <i data-lucide="trash-2" class="h-4 w-4"></i>Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${invoicesPage.totalElements == 0}">
                <td class="px-4 py-6 text-slate-400" colspan="6">No invoices found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-5 flex flex-col gap-3 text-sm text-slate-400 sm:flex-row sm:items-center sm:justify-between">
        <p>Page <span th:text="${invoicesPage.number + 1}">1</span> of <span th:text="${invoicesPage.totalPages > 0 ? invoicesPage.totalPages : 1}">1</span></p>
        <div class="flex gap-2">
            <a th:if="${invoicesPage.hasPrevious()}" class="action-button bg-white/5 text-slate-200 hover:bg-white/10"
               th:href="@{/invoices(page=${invoicesPage.number - 1}, q=${keyword}, status=${selectedStatus})}">
                <i data-lucide="chevron-left" class="h-4 w-4"></i>Prev
            </a>
            <a th:if="${invoicesPage.hasNext()}" class="action-button bg-white/5 text-slate-200 hover:bg-white/10"
               th:href="@{/invoices(page=${invoicesPage.number + 1}, q=${keyword}, status=${selectedStatus})}">
                Next<i data-lucide="chevron-right" class="h-4 w-4"></i>
            </a>
        </div>
    </div>
</section>
</html>
