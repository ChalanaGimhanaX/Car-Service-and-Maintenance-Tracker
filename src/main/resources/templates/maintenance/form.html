<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Maintenance Reminder Form', ~{::section})}">
<section>
    <div class="mb-6">
        <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Maintenance schedule</p>
        <h1 class="text-3xl font-semibold text-white" th:text="${formMode == 'edit' ? 'Edit reminder' : 'Add reminder'}">Add reminder</h1>
        <p class="text-sm text-slate-400">Use last service date and interval days to calculate the next due date, or enter a due date manually.</p>
    </div>

    <form class="rounded-md border soft-border glass-panel p-5" th:object="${maintenanceReminderForm}"
          th:action="${formMode == 'edit'} ? @{/maintenance/{id}/edit(id=${reminderId})} : @{/maintenance}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="title">Reminder title</label>
                <input class="form-input" id="title" type="text" th:field="*{title}" placeholder="Oil change">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="vehicleId">Vehicle</label>
                <select class="form-input" id="vehicleId" th:field="*{vehicleId}">
                    <option value="">Select vehicle</option>
                    <option th:each="vehicle : ${vehicles}" th:value="${vehicle.id}" th:text="${vehicle.vehicleNumber + ' - ' + vehicle.brand + ' ' + vehicle.model}"></option>
                </select>
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('vehicleId')}" th:errors="*{vehicleId}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="lastServiceDate">Last service date</label>
                <input class="form-input" id="lastServiceDate" type="date" th:field="*{lastServiceDate}">
                <p class="mt-1 text-xs text-slate-500">Optional when entering a manual due date.</p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="intervalDays">Interval days</label>
                <input class="form-input" id="intervalDays" type="number" min="1" th:field="*{intervalDays}" placeholder="90">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('intervalDays')}" th:errors="*{intervalDays}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="dueDate">Due date</label>
                <input class="form-input" id="dueDate" type="date" th:field="*{dueDate}">
                <p class="mt-1 text-xs text-slate-500">Leave empty to calculate from last service date and interval.</p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="priority">Priority</label>
                <select class="form-input" id="priority" th:field="*{priority}">
                    <option th:each="priority : ${priorityValues}" th:value="${priority}" th:text="${priority}"></option>
                </select>
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="status">Status</label>
                <select class="form-input" id="status" th:field="*{status}">
                    <option th:each="status : ${statusValues}" th:value="${status}" th:text="${status}"></option>
                </select>
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
            </div>
        </div>

        <div class="mt-4">
            <label class="mb-2 block text-sm font-medium text-slate-300" for="note">Note</label>
            <textarea class="form-input min-h-32" id="note" th:field="*{note}" placeholder="Parts needed, service history reference, or customer instruction"></textarea>
            <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('note')}" th:errors="*{note}"></p>
        </div>

        <div class="mt-5 flex flex-wrap gap-3">
            <button class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" type="submit">
                <i data-lucide="save" class="h-4 w-4"></i><span th:text="${formMode == 'edit' ? 'Save changes' : 'Create reminder'}">Save</span>
            </button>
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/maintenance}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Back to list
            </a>
        </div>
    </form>
</section>
</html>
