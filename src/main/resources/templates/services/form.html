<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Service Form', ~{::section})}">
<section>
    <div class="mb-6">
        <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Workshop jobs</p>
        <h1 class="text-3xl font-semibold text-white" th:text="${formMode == 'edit' ? 'Edit service record' : 'Add service record'}">Add service record</h1>
        <p class="text-sm text-slate-400">Store customer, vehicle, technician, and service cost details.</p>
    </div>

    <form class="rounded-md border soft-border glass-panel p-5" th:object="${serviceForm}"
          th:action="${formMode == 'edit'} ? @{/services/{id}/edit(id=${serviceId})} : @{/services}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="grid gap-4 md:grid-cols-2">
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="serviceCode">Service code</label>
                <input class="form-input" id="serviceCode" type="text" th:field="*{serviceCode}" placeholder="SRV-1004">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('serviceCode')}" th:errors="*{serviceCode}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="vehicleNumber">Vehicle number</label>
                <input class="form-input" id="vehicleNumber" type="text" th:field="*{vehicleNumber}" placeholder="WP ABC-1234">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('vehicleNumber')}" th:errors="*{vehicleNumber}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="customerName">Customer name</label>
                <input class="form-input" id="customerName" type="text" th:field="*{customerName}" placeholder="Chalana Perera">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="serviceType">Service type</label>
                <input class="form-input" id="serviceType" type="text" th:field="*{serviceType}" placeholder="Engine tune up">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('serviceType')}" th:errors="*{serviceType}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="serviceDate">Service date</label>
                <input class="form-input" id="serviceDate" type="date" th:field="*{serviceDate}">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('serviceDate')}" th:errors="*{serviceDate}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="cost">Cost (LKR)</label>
                <input class="form-input" id="cost" type="number" step="0.01" min="0" th:field="*{cost}" placeholder="9500.00">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('cost')}" th:errors="*{cost}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="technicianName">Technician name</label>
                <input class="form-input" id="technicianName" type="text" th:field="*{technicianName}" placeholder="Ruwan Silva">
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('technicianName')}" th:errors="*{technicianName}"></p>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-300" for="status">Status</label>
                <select class="form-input" id="status" th:field="*{status}">
                    <option th:each="status : ${statusValues}" th:value="${status}" th:text="${status}"></option>
                </select>
                <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
            </div>
        </div>

        <div class="mt-4">
            <label class="mb-2 block text-sm font-medium text-slate-300" for="notes">Notes</label>
            <textarea class="form-input min-h-32" id="notes" th:field="*{notes}" placeholder="Parts replaced, customer feedback, or workshop notes"></textarea>
            <p class="mt-1 text-xs text-rose-300" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></p>
        </div>

        <div class="mt-5 flex flex-wrap gap-3">
            <button class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" type="submit">
                <i data-lucide="save" class="h-4 w-4"></i><span th:text="${formMode == 'edit' ? 'Save changes' : 'Create record'}">Save</span>
            </button>
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/services}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Back to list
            </a>
        </div>
    </form>
</section>
</html>
