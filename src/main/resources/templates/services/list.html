<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/base :: layout('Service Records', ~{::section})}">
<section>
    <div class="mb-6 flex flex-wrap items-start justify-between gap-4">
        <div>
            <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Maintenance history</p>
            <h1 class="text-3xl font-semibold text-white">Service Records</h1>
            <p class="text-sm text-slate-400">View and manage all vehicle service history.</p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" th:href="@{/services/new}">
            <i data-lucide="plus" class="h-4 w-4"></i>Add service record
        </a>
    </div>

    <form class="mb-6 flex flex-wrap gap-3" method="get" th:action="@{/services}">
        <input class="form-input w-full sm:w-64" type="text" name="q" placeholder="Search by type, center, vehicle..."
               th:value="${keyword}">
        <select class="form-input w-full sm:w-48" name="vehicleId">
            <option value="">All vehicles</option>
            <option th:each="v : ${vehicles}" th:value="${v.id}" th:text="${v.vehicleNumber + ' - ' + v.brand + ' ' + v.model}"
                    th:selected="${v.id == selectedVehicleId}"></option>
        </select>
        <button class="action-button bg-white/5 text-slate-200 hover:bg-white/10" type="submit">
            <i data-lucide="search" class="h-4 w-4"></i>Search
        </button>
        <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/services}">
            <i data-lucide="x" class="h-4 w-4"></i>Clear
        </a>
    </form>

    <div class="rounded-md border soft-border glass-panel overflow-hidden">
        <table class="w-full text-sm text-slate-300">
            <thead class="border-b border-white/10 text-xs uppercase tracking-wider text-slate-400">
            <tr>
                <th class="px-4 py-3 text-left">Vehicle</th>
                <th class="px-4 py-3 text-left">Service Type</th>
                <th class="px-4 py-3 text-left">Date</th>
                <th class="px-4 py-3 text-left">Mileage</th>
                <th class="px-4 py-3 text-left">Center</th>
                <th class="px-4 py-3 text-left">Progress</th>
                <th class="px-4 py-3 text-left">Cost (LKR)</th>
                <th class="px-4 py-3 text-left">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${recordsPage.isEmpty()}">
                <td class="px-4 py-8 text-center text-slate-500" colspan="8">No service records found.</td>
            </tr>
            <tr class="border-t border-white/5 hover:bg-white/5"
                th:each="record : ${recordsPage.content}">
                <td class="px-4 py-3">
                    <a class="font-medium text-emerald-300 hover:underline"
                       th:href="@{/vehicles/{id}(id=${record.vehicle.id})}"
                       th:text="${record.vehicle.vehicleNumber}"></a>
                    <p class="text-xs text-slate-500" th:text="${record.vehicle.brand + ' ' + record.vehicle.model}"></p>
                </td>
                <td class="px-4 py-3" th:text="${record.serviceType}"></td>
                <td class="px-4 py-3" th:text="${#temporals.format(record.serviceDate, 'dd MMM yyyy')}"></td>
                <td class="px-4 py-3" th:text="${record.mileageAtService + ' km'}"></td>
                <td class="px-4 py-3" th:text="${record.serviceCenter != null ? record.serviceCenter : '-'}"></td>
                <td class="px-4 py-3">
                    <span class="badge"
                          th:with="status=${record.serviceStatus != null ? record.serviceStatus.name() : 'COMPLETED'}"
                          th:classappend="${status == 'COMPLETED'} ? ' badge-active' : (${status == 'PENDING'} ? ' badge-pending' : (${status == 'WAITING_FOR_PARTS'} ? ' badge-suspended' : ' badge-info'))"
                          th:text="${status}">IN_PROGRESS</span>
                </td>
                <td class="px-4 py-3" th:text="${#numbers.formatDecimal(record.cost, 1, 'COMMA', 2, 'POINT')}"></td>
                <td class="px-4 py-3">
                    <div class="flex flex-wrap gap-2">
                        <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10"
                           th:href="@{/services/{id}(id=${record.id})}">
                            <i data-lucide="eye" class="h-4 w-4"></i>View
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" class="action-button bg-white/5 text-slate-200 hover:bg-white/10"
                           th:href="@{/services/{id}/edit(id=${record.id})}">
                            <i data-lucide="pencil" class="h-4 w-4"></i>Edit
                        </a>
                        <form sec:authorize="hasRole('ADMIN')" th:action="@{/services/{id}/delete(id=${record.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="action-button bg-rose-500/15 text-rose-200 hover:bg-rose-500/25" type="submit">
                                <i data-lucide="trash-2" class="h-4 w-4"></i>Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 flex flex-wrap gap-2" th:if="${recordsPage.totalPages > 1}">
        <a th:each="i : ${#numbers.sequence(0, recordsPage.totalPages - 1)}"
           th:href="@{/services(page=${i}, q=${keyword}, vehicleId=${selectedVehicleId})}"
           th:text="${i + 1}"
           th:classappend="${i == recordsPage.number} ? 'bg-emerald-500 text-slate-950' : 'bg-white/5 text-slate-200 hover:bg-white/10'"
           class="action-button"></a>
    </div>
</section>
</html>
