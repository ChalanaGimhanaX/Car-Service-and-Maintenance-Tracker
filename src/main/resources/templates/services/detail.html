<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Service Detail', ~{::section})}">
<section>
    <div class="mb-6 flex flex-wrap items-start justify-between gap-4">
        <div>
            <p class="text-sm uppercase tracking-[0.22em] text-emerald-300">Maintenance history</p>
            <h1 class="text-3xl font-semibold text-white">Service Record Detail</h1>
            <p class="text-sm text-slate-400">Full details of this service entry.</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <a class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400"
               th:href="@{/invoices/new(serviceRecordId=${record.id})}">
                <i data-lucide="receipt" class="h-4 w-4"></i>Create invoice
            </a>
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10"
               th:href="@{/services/{id}/edit(id=${record.id})}">
                <i data-lucide="pencil" class="h-4 w-4"></i>Edit
            </a>
            <form th:action="@{/services/{id}/delete(id=${record.id})}" method="post"
                  onsubmit="return confirm('Delete this service record?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="action-button bg-rose-500/20 text-rose-300 hover:bg-rose-500/30" type="submit">
                    <i data-lucide="trash-2" class="h-4 w-4"></i>Delete
                </button>
            </form>
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/services}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Back to list
            </a>
        </div>
    </div>

    <div class="rounded-md border soft-border glass-panel p-5 grid gap-6 md:grid-cols-2">

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Vehicle</p>
            <a class="text-emerald-300 hover:underline font-medium"
               th:href="@{/vehicles/{id}(id=${record.vehicle.id})}"
               th:text="${record.vehicle.vehicleNumber}"></a>
            <p class="text-sm text-slate-400" th:text="${record.vehicle.brand + ' ' + record.vehicle.model}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Service Type</p>
            <p class="text-white font-medium" th:text="${record.serviceType}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Service Date</p>
            <p class="text-white" th:text="${record.serviceDate}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Mileage at Service</p>
            <p class="text-white" th:text="${record.mileageAtService + ' km'}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Service Center</p>
            <p class="text-white" th:text="${record.serviceCenter != null ? record.serviceCenter : '-'}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Cost (LKR)</p>
            <p class="text-white" th:text="${#numbers.formatDecimal(record.cost, 1, 2)}"></p>
        </div>

        <div class="md:col-span-2">
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Notes</p>
            <p class="text-white" th:text="${record.notes != null ? record.notes : '-'}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Created At</p>
            <p class="text-slate-400 text-sm" th:text="${record.createdAt}"></p>
        </div>

        <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Last Updated</p>
            <p class="text-slate-400 text-sm" th:text="${record.updatedAt}"></p>
        </div>

    </div>
</section>
</html>
