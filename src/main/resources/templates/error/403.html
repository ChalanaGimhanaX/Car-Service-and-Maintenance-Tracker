<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbidden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
<main class="mx-auto flex min-h-screen max-w-3xl items-center px-6">
    <div class="rounded-md border soft-border glass-panel p-8">
        <p class="text-sm uppercase tracking-[0.2em] text-amber-300">Access denied</p>
        <h1 class="mt-3 text-3xl font-semibold text-white">You do not have permission for this page</h1>
        <p class="mt-3 text-sm text-slate-400">Switch to the admin account or return to the dashboard.</p>
        <div class="mt-6 flex gap-3">
            <a class="action-button bg-white/5 text-slate-200 hover:bg-white/10" th:href="@{/dashboard}">
                <i data-lucide="arrow-left" class="h-4 w-4"></i>Dashboard
            </a>
            <a class="action-button bg-emerald-500 text-slate-950 hover:bg-emerald-400" th:href="@{/login}">
                <i data-lucide="log-in" class="h-4 w-4"></i>Login
            </a>
        </div>
    </div>
</main>
</body>
</html>
